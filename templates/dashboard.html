{% extends 'base.html' %}

{% block content %}
<h2>My Bookings</h2>

{% for booking in bookings %}
<div class="card">
    <p>Car: {{ booking.car.name }}</p>
    <p>From: {{ booking.start_date }}</p>
    <p>To: {{ booking.end_date }}</p>
    <p>Total: ₹{{ booking.total_amount }}</p>

    <a href="/home/bill/{{ booking.id }}/">
        <button>View Bill</button>
    </a>
</div>
{% endfor %}

{% endblock %}
